version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:7860"
    environment:
      - PORT=7860
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
